<!doctype html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>USD/IRR Dashboard</title>
<link href="https://cdn.jsdelivr.net/npm/@tabler/core@latest/dist/css/tabler.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="theme-dark">
<div class="page">
  <header class="navbar navbar-expand-md navbar-dark d-print-none" style="background:#0f172a;">
    <div class="container-xl">
      <a class="navbar-brand navbar-brand-autodark text-white" href="/">USD/IRR Open Market Reference</a>
      <div class="navbar-nav flex-row gap-3">
        <a class="nav-link text-white" href="/">Home</a>
        <a class="nav-link text-white" href="/archive/">Archive</a>
        <a class="nav-link text-white" href="/status/">Status</a>
        <a class="nav-link text-white" href="/methodology/">Methodology</a>
      </div>
    </div>
  </header>
  <div class="page-wrapper" style="background:#0b1220; min-height:100vh;">
    <div class="container-xl py-4">
      <div class="row row-deck row-cards">
  <div class="col-lg-6">
    <div class="card bg-dark text-white">
      <div class="card-body">
        <div class="text-secondary mb-2">TODAY'S REFERENCE</div>
        <div class="h1 mb-1">N/A IRR</div>
        <div class="text-secondary">Date: 2026-03-08 | As of: 2026-03-08T05:44:37Z</div>
        <div class="row mt-4">
          <div class="col-4">
            <div class="text-secondary">Band (P25-P75)</div>
            <div>N/A - N/A</div>
          </div>
          <div class="col-4">
            <div class="text-secondary">Status</div>
            <div>CONFIG NEEDED</div>
          </div>
          <div class="col-4">
            <div class="text-secondary">Withheld</div>
            <div>Yes</div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="col-lg-6">
    <div class="card bg-dark text-white">
      <div class="card-body">
        <div class="text-secondary mb-2">HISTORICAL SERIES</div>
        <canvas id="historyChart" height="160"></canvas>
      </div>
    </div>
  </div>

  <div class="col-12">
    <div class="card bg-dark text-white">
      <div class="card-body">
        <div class="text-secondary mb-3">RECENT DAILY REFERENCES</div>
        <div class="table-responsive">
          <table class="table table-dark table-vcenter">
            <thead>
              <tr>
                <th>Date</th>
                <th>Fix</th>
                <th>Status</th>
              </tr>
            </thead>
            <tbody id="recent-days">
              <tr><td colspan="3">Loading...</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
async function loadSeries() {
  const res = await fetch('/api/series.json');
  const data = await res.json();
  const rows = data.rows || [];

  const tbody = document.getElementById('recent-days');
  tbody.innerHTML = rows.slice(-30).reverse().map(r => `
    <tr>
      <td>${r.date}</td>
      <td>${r.fix ?? 'N/A'}</td>
      <td>${r.status ?? 'N/A'}</td>
    </tr>
  `).join('');

  const ctx = document.getElementById('historyChart').getContext('2d');
  new Chart(ctx, {
    type: 'line',
    data: {
      labels: rows.map(r => r.date),
      datasets: [{
        label: 'USD/IRR',
        data: rows.map(r => r.fix),
        borderColor: '#3b82f6',
        backgroundColor: 'rgba(59,130,246,0.15)',
        tension: 0.2,
        fill: true
      }]
    },
    options: {
      responsive: true,
      plugins: { legend: { display: false } },
      scales: {
        x: { ticks: { color: '#94a3b8' }, grid: { color: '#1e293b' } },
        y: { ticks: { color: '#94a3b8' }, grid: { color: '#1e293b' } }
      }
    }
  });
}
loadSeries();
</script>

      <div class="text-secondary mt-4">Generated at 2026-03-08T05:44:37Z</div>
    </div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/@tabler/core@latest/dist/js/tabler.min.js"></script>
</body>
</html>

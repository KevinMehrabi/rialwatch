<!doctype html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Status</title>
<link href="https://cdn.jsdelivr.net/npm/@tabler/core@latest/dist/css/tabler.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
  .dashboard-container {
    max-width: 1280px;
    margin: 0 auto;
  }

  .dashboard-section {
    margin-top: 16px;
  }

  .dashboard-section:first-child {
    margin-top: 0;
  }

  .top-grid,
  .indicators-grid,
  .readings-grid,
  .signals-grid {
    display: grid;
    gap: 20px;
    align-items: stretch;
  }

  .top-grid {
    grid-template-columns: 4fr 8fr;
    align-items: start;
  }

  .indicators-grid {
    grid-template-columns: repeat(4, minmax(0, 1fr));
    width: 100%;
  }

  .readings-grid,
  .signals-grid {
    grid-template-columns: repeat(2, minmax(0, 1fr));
    width: 100%;
  }

  .dashboard-card {
    display: flex;
    padding: 18px;
    min-height: 220px;
    height: 100%;
  }

  .top-grid .dashboard-card {
    min-height: 0;
  }

  .dashboard-card .card-body {
    padding: 0;
    display: flex;
    flex-direction: column;
    height: 100%;
  }

  .panel-top .fw-semibold {
    line-height: 1.2;
  }

  .panel-middle {
    margin-top: 14px;
  }

  .value-row {
    display: flex;
    align-items: baseline;
    gap: 8px;
    flex-wrap: wrap;
  }

  .value-row .panel-value {
    font-size: 1.6rem;
    line-height: 1.1;
    font-weight: 600;
    margin: 0;
  }

  .value-row .unit-label {
    font-size: 0.75rem;
    color: #94a3b8;
    letter-spacing: 0.01em;
  }

  .panel-bottom {
    border-top: 1px solid rgba(148, 163, 184, 0.2);
    margin-top: auto;
    padding-top: 10px;
  }

  .panel-meta-row {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    font-size: 0.75rem;
    color: #94a3b8;
    line-height: 1.2;
  }

  .meta-pill {
    border: 1px solid rgba(148, 163, 184, 0.25);
    border-radius: 999px;
    padding: 2px 8px;
    white-space: nowrap;
  }

  .panel-sparkline {
    min-height: 22px;
    font-size: 0.75rem;
    color: #94a3b8;
  }

  .sparkline-svg {
    display: block;
    width: 100%;
    height: 20px;
  }

  .indicator-note {
    margin-top: auto;
    padding-top: 10px;
    font-size: 0.75rem;
    color: #94a3b8;
  }

  .dashboard-title {
    margin-bottom: 10px;
  }

  .chart-card #historyChart {
    max-height: 300px;
  }

  .recent-table-wrap {
    width: 100%;
  }

  .recent-table-card .panel-top {
    margin-bottom: 10px;
  }

  .table-card {
    min-height: 0;
    height: auto;
    align-self: start;
  }

  .table-card .card-body {
    padding-bottom: 8px;
  }

  .recent-table-subtitle {
    font-size: 0.8rem;
    color: #94a3b8;
  }

  .recent-table-divider {
    border-top: 1px solid rgba(148, 163, 184, 0.2);
    margin-bottom: 10px;
  }

  .recent-table-card .table-responsive {
    margin-top: 0;
  }

  .recent-table-card .table {
    margin-bottom: 0;
  }

  .recent-table-card thead th {
    background: #1e293b;
    color: #cbd5e1;
    border-bottom: 1px solid #334155;
    font-size: 0.78rem;
    letter-spacing: 0.02em;
    text-transform: uppercase;
    padding-top: 0.45rem;
    padding-bottom: 0.45rem;
  }

  .recent-table-card tbody td {
    border-color: #334155;
    padding-top: 0.45rem;
    padding-bottom: 0.45rem;
  }

  @media (max-width: 1100px) {
    .indicators-grid {
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }
  }

  @media (max-width: 700px) {
    .top-grid,
    .indicators-grid,
    .readings-grid,
    .signals-grid {
      grid-template-columns: 1fr;
    }

    .top-grid .dashboard-card {
      min-height: 320px;
    }
  }
</style>
</head>
<body class="theme-dark">
<div class="page">
  <header class="navbar navbar-expand-md navbar-dark d-print-none" style="background:#0f172a;">
    <div class="container-xl">
      <a class="navbar-brand navbar-brand-autodark text-white" href="/">USD/IRR Open Market Reference</a>
      <div class="navbar-nav flex-row gap-3">
        <a class="nav-link text-white" href="/">Home</a>
        <a class="nav-link text-white" href="/archive/">Archive</a>
        <a class="nav-link text-white" href="/status/">Status</a>
        <a class="nav-link text-white" href="/methodology/">Methodology</a>
      </div>
    </div>
  </header>
  <div class="page-wrapper" style="background:#0b1220; min-height:100vh;">
    <div class="container-xl py-4 dashboard-container">
      <div class="mb-3">
  <h1 class="page-title">System Status</h1>
  <p class="text-secondary mb-0">Publishing and data-quality posture.</p>
</div>

<section class="card">
  <div class="card-body">
    <div class="d-flex align-items-center justify-content-between mb-3">
      <h3 class="card-title mb-0">Current State</h3>
      <span class="status-pill status-OK">OK</span>
    </div>
    <p class="mb-3">Build-only mode: refreshed 2026-03-09 from current-day intraday sample selection using current benchmark logic.</p>
    
  </div>
</section>

      <div class="text-secondary mt-4">Generated at 2026-03-09T21:45:05Z</div>
    </div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/@tabler/core@latest/dist/js/tabler.min.js"></script>
</body>
</html>

<script>
(() => {
  const root = document.documentElement;
  const toggle = document.getElementById('theme-toggle');
  const logo = document.getElementById('site-logo');
  const applyTheme = (theme) => {
    root.setAttribute('data-theme', theme);
    try {
      localStorage.setItem('rw-theme', theme);
    } catch (error) {
      // Ignore storage failures and keep the in-memory theme.
    }
    if (logo) {
      const darkLogo = logo.getAttribute('data-logo-dark');
      const lightLogo = logo.getAttribute('data-logo-light');
      logo.src = theme === 'light' ? lightLogo : darkLogo;
    }
    if (toggle) {
      const nextLabel = theme === 'light' ? 'Dark mode' : 'Light mode';
      toggle.textContent = nextLabel;
      toggle.setAttribute('aria-pressed', theme === 'light' ? 'true' : 'false');
    }
    document.dispatchEvent(new CustomEvent('rw-theme-change', { detail: { theme } }));
  };

  const el = document.getElementById('site-last-update');
  if (el) {
    const raw = el.getAttribute('data-ts') || '';
    const d = new Date(raw);
    if (raw && !Number.isNaN(d.getTime())) {
      const fmt = new Intl.DateTimeFormat('en-US', {
        year: 'numeric',
        month: 'short',
        day: '2-digit',
        hour: '2-digit',
        minute: '2-digit',
        hour12: false,
        timeZone: 'UTC'
      });
      el.textContent = `Last update: ${fmt.format(d)} UTC`;
    }
  }

  const currentTheme = root.getAttribute('data-theme') === 'light' ? 'light' : 'dark';
  applyTheme(currentTheme);
  if (toggle) {
    toggle.addEventListener('click', () => {
      const nextTheme = root.getAttribute('data-theme') === 'light' ? 'dark' : 'light';
      applyTheme(nextTheme);
    });
  }
})();
</script>

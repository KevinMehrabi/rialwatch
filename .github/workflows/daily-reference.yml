name: Daily USD/IRR Reference

on:
  push:
    branches:
      - main
  schedule:
    # Publish official daily benchmark at 14:20 UTC from intraday history.
    - cron: "20 14 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: daily-usd-irr-reference
  cancel-in-progress: false

jobs:
  build_publish:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run pipeline
        env:
          BONBAST_USERNAME: ${{ secrets.BONBAST_USERNAME }}
          BONBAST_HASH: ${{ secrets.BONBAST_HASH }}
          NAVASAN_API_KEY: ${{ secrets.NAVASAN_API_KEY }}
          ALANCHAND_API_KEY: ${{ secrets.ALANCHAND_API_KEY }}
          BONBAST_API_URL: ${{ secrets.BONBAST_API_URL }}
          NAVASAN_API_URL: ${{ secrets.NAVASAN_API_URL }}
          ALANCHAND_API_URL: ${{ secrets.ALANCHAND_API_URL }}
        run: |
          if [ "${{ github.event_name }}" = "schedule" ]; then
            python3 scripts/pipeline.py --mode publish-daily --site-dir site --templates-dir templates
          else
            python3 scripts/pipeline.py --site-dir site --templates-dir templates --no-new-reference
          fi

      - name: Persist daily snapshots
        if: github.event_name == 'schedule'
        run: |
          targets=()
          for path in site/fix site/api/latest.json site/api/series.json site/archive/index.html; do
            if [ -e "$path" ]; then
              targets+=("$path")
            fi
          done

          if [ "${#targets[@]}" -eq 0 ]; then
            echo "No snapshot paths found."
            exit 0
          fi

          if [ -z "$(git status --porcelain -- "${targets[@]}")" ]; then
            echo "No snapshot changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "${targets[@]}"
          git commit -m "publish: daily USD/IRR reference [skip ci]"
          git push origin main

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

name: Intraday USD/IRR Collection

on:
  schedule:
    # Buffered cadence around the publication window to absorb workflow startup delay.
    - cron: "35 13 * * *"
    - cron: "50 13 * * *"
    - cron: "5 14 * * *"
    - cron: "13 14 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: intraday-usd-irr-collection
  cancel-in-progress: false

jobs:
  collect_intraday:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Playwright (Bonbast browser collector)
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install playwright
          python3 -m playwright install --with-deps chromium

      - name: Collect one intraday attempt
        env:
          NAVASAN_API_KEY: ${{ secrets.NAVASAN_API_KEY }}
          ALANCHAND_API_KEY: ${{ secrets.ALANCHAND_API_KEY }}
          BONBAST_SITE_URL: ${{ vars.BONBAST_SITE_URL }}
          NAVASAN_API_URL: ${{ secrets.NAVASAN_API_URL }}
          ALANCHAND_API_URL: ${{ secrets.ALANCHAND_API_URL }}
        run: |
          python3 scripts/pipeline.py --mode collect-intraday --site-dir site --templates-dir templates

      - name: Persist intraday snapshots
        run: |
          today="$(date -u +%F)"
          target_dir="site/intraday/${today}"
          targets=()
          if [ -d "$target_dir" ]; then
            targets+=("$target_dir")
          fi
          if [ -e "site/api/intraday/latest.json" ]; then
            targets+=("site/api/intraday/latest.json")
          fi

          if [ "${#targets[@]}" -eq 0 ]; then
            echo "No intraday artifacts for ${today}."
            exit 0
          fi

          if [ -z "$(git status --porcelain -- "${targets[@]}")" ]; then
            echo "No intraday changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "${targets[@]}"
          git commit -m "collect: intraday USD/IRR sample ${today} [skip ci]"
          git push origin main

name: Intraday USD/IRR Collection

on:
  schedule:
    # Buffered 3-shot cadence around the publication window to absorb workflow startup delay
    # without over-polling upstream APIs.
    - cron: "35 13 * * *"
    - cron: "50 13 * * *"
    - cron: "5 14 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: intraday-usd-irr-collection
  cancel-in-progress: false

jobs:
  collect_intraday:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Ensure data branch exists
        run: |
          if git ls-remote --exit-code --heads origin data/live >/dev/null 2>&1; then
            echo "data/live already exists."
          else
            echo "Bootstrapping data/live from current main."
            git push origin HEAD:data/live
          fi

      - name: Checkout data branch
        uses: actions/checkout@v4
        with:
          ref: data/live
          path: state
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Playwright (Bonbast browser collector)
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install playwright
          python3 -m playwright install --with-deps chromium

      - name: Collect one intraday attempt
        env:
          NAVASAN_API_KEY: ${{ secrets.NAVASAN_API_KEY }}
          ALANCHAND_API_KEY: ${{ secrets.ALANCHAND_API_KEY }}
          BONBAST_SITE_URL: ${{ vars.BONBAST_SITE_URL }}
          NAVASAN_API_URL: ${{ secrets.NAVASAN_API_URL }}
          ALANCHAND_API_URL: ${{ secrets.ALANCHAND_API_URL }}
        run: |
          python3 scripts/pipeline.py --mode collect-intraday --site-dir state/site --templates-dir templates

      - name: Persist intraday snapshots
        run: |
          data_branch="data/live"
          today="$(date -u +%F)"
          target_dir="site/intraday/${today}"
          targets=()
          if [ -d "state/${target_dir}" ]; then
            targets+=("$target_dir")
          fi
          if [ -e "state/site/api/intraday/latest.json" ]; then
            targets+=("site/api/intraday/latest.json")
          fi

          if [ "${#targets[@]}" -eq 0 ]; then
            echo "No intraday artifacts for ${today}."
            exit 0
          fi

          if [ -z "$(git -C state status --porcelain -- "${targets[@]}")" ]; then
            echo "No intraday changes to commit."
            exit 0
          fi

          git -C state config user.name "github-actions[bot]"
          git -C state config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git -C state add "${targets[@]}"
          git -C state commit -m "collect: intraday USD/IRR sample ${today} [skip ci]"

          for attempt in 1 2 3; do
            if git -C state push origin "${data_branch}"; then
              echo "Push succeeded on attempt ${attempt}."
              exit 0
            fi
            echo "Push rejected on attempt ${attempt}; rebasing onto origin/${data_branch} and retrying..."
            if ! git -C state pull --rebase --autostash origin "${data_branch}"; then
              echo "::warning::Rebase failed after push rejection (likely concurrent intraday update). Skipping this snapshot to avoid noisy workflow failures."
              exit 0
            fi
          done

          echo "::warning::Failed to push intraday snapshots to ${data_branch} after 3 attempts. A newer snapshot was likely published by a concurrent run."
          exit 0

<!doctype html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>${title}</title>
<link href="https://cdn.jsdelivr.net/npm/@tabler/core@latest/dist/css/tabler.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
  .dashboard-container {
    max-width: 1200px;
    margin: 0 auto;
  }

  .dashboard-section {
    margin-top: 16px;
  }

  .dashboard-section:first-child {
    margin-top: 0;
  }

  .top-grid,
  .indicators-grid,
  .readings-grid,
  .signals-grid {
    display: grid;
    gap: 20px;
    align-items: stretch;
  }

  .top-grid {
    grid-template-columns: minmax(0, 5fr) minmax(0, 7fr);
    align-items: start;
  }

  .indicators-grid {
    grid-template-columns: repeat(4, minmax(0, 1fr));
    max-width: 900px;
    margin: 0 auto;
  }

  .readings-grid,
  .signals-grid {
    grid-template-columns: repeat(2, minmax(0, 1fr));
    max-width: 900px;
    margin: 0 auto;
  }

  .dashboard-card {
    min-height: 220px;
    height: 100%;
  }

  .top-grid .dashboard-card {
    min-height: 0;
  }

  .dashboard-card .card-body {
    display: flex;
    flex-direction: column;
    height: 100%;
  }

  .dashboard-title {
    margin-bottom: 10px;
  }

  .chart-card #historyChart {
    max-height: 300px;
  }

  .recent-table-wrap {
    max-width: 900px;
    margin: 0 auto;
  }

  @media (max-width: 1100px) {
    .indicators-grid {
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }
  }

  @media (max-width: 700px) {
    .top-grid,
    .indicators-grid,
    .readings-grid,
    .signals-grid {
      grid-template-columns: 1fr;
    }

    .top-grid .dashboard-card {
      min-height: 320px;
    }
  }
</style>
</head>
<body class="theme-dark">
<div class="page">
  <header class="navbar navbar-expand-md navbar-dark d-print-none" style="background:#0f172a;">
    <div class="container-xl">
      <a class="navbar-brand navbar-brand-autodark text-white" href="/">USD/IRR Open Market Reference</a>
      <div class="navbar-nav flex-row gap-3">
        <a class="nav-link text-white" href="/">Home</a>
        <a class="nav-link text-white" href="/archive/">Archive</a>
        <a class="nav-link text-white" href="/status/">Status</a>
        <a class="nav-link text-white" href="/methodology/">Methodology</a>
      </div>
    </div>
  </header>
  <div class="page-wrapper" style="background:#0b1220; min-height:100vh;">
    <div class="container-xl py-4 dashboard-container">
      ${content}
      <div class="text-secondary mt-4">Generated at ${generated_at}</div>
    </div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/@tabler/core@latest/dist/js/tabler.min.js"></script>
</body>
</html>

<div class="row row-deck row-cards">
  <div class="col-lg-6">
    <div class="card bg-dark text-white">
      <div class="card-body">
        <div class="text-secondary mb-2">TODAY'S REFERENCE</div>
        <div class="h1 mb-1">${fix} IRR</div>
        <div class="text-secondary">Date: ${date} | As of: ${as_of}</div>
        <div class="row mt-4">
          <div class="col-4">
            <div class="text-secondary">Band (P25-P75)</div>
            <div>${p25} - ${p75}</div>
          </div>
          <div class="col-4">
            <div class="text-secondary">Status</div>
            <div>${status}</div>
          </div>
          <div class="col-4">
            <div class="text-secondary">Withheld</div>
            <div>${withheld}</div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="col-lg-6">
    <div class="card bg-dark text-white">
      <div class="card-body">
        <div class="text-secondary mb-2">HISTORICAL SERIES</div>
        <canvas id="historyChart" height="160"></canvas>
      </div>
    </div>
  </div>

  <div class="col-12">
    <div class="card bg-dark text-white">
      <div class="card-body">
        <div class="text-secondary mb-3">RECENT DAILY REFERENCES</div>
        <div class="table-responsive">
          <table class="table table-dark table-vcenter">
            <thead>
              <tr>
                <th>Date</th>
                <th>Fix</th>
                <th>Status</th>
              </tr>
            </thead>
            <tbody id="recent-days">
              <tr><td colspan="3">Loading...</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
async function loadSeries() {
  const seriesUrl = new URL('api/series.json', window.location.href);
  const res = await fetch(seriesUrl.toString());
  const data = await res.json();
  const rows = data.rows || [];
  const marketStatuses = new Set(['Green', 'Amber', 'Red']);
  const toFixNumber = (value) => {
    if (typeof value === 'number') {
      return Number.isFinite(value) && value > 0 ? value : null;
    }
    if (typeof value === 'string') {
      const cleaned = value.trim().replace(/,/g, '');
      if (!cleaned) return null;
      const parsed = Number(cleaned);
      return Number.isFinite(parsed) && parsed > 0 ? parsed : null;
    }
    return null;
  };
  const toBool = (value) => {
    if (typeof value === 'boolean') return value;
    if (typeof value === 'string') {
      const lowered = value.trim().toLowerCase();
      if (lowered === 'true') return true;
      if (lowered === 'false') return false;
    }
    return null;
  };
  const validRows = rows
    .map(r => {
      const status = typeof r.status === 'string' ? r.status.trim() : '';
      return {
        ...r,
        status,
        fixNum: toFixNumber(r.fix),
        withheldBool: toBool(r.withheld)
      };
    })
    .filter(r => r.fixNum !== null && r.withheldBool === false && marketStatuses.has(r.status));

  const tbody = document.getElementById('recent-days');
  if (!validRows.length) {
    tbody.innerHTML = '<tr><td colspan="3">No valid published daily fixes yet.</td></tr>';
  } else {
    tbody.innerHTML = validRows.slice(-30).reverse().map(r => `
      <tr>
        <td>${r.date}</td>
        <td>${r.fixNum}</td>
        <td>${r.status}</td>
      </tr>
    `).join('');
  }

  const canvas = document.getElementById('historyChart');
  if (!canvas) return;
  const ctx = canvas.getContext('2d');

  if (!validRows.length) {
    const holder = canvas.parentElement;
    if (holder && !holder.querySelector('.no-series-note')) {
      const note = document.createElement('div');
      note.className = 'text-secondary mt-2 no-series-note';
      note.textContent = 'No valid published historical fixes available yet.';
      holder.appendChild(note);
    }
    return;
  }

  new Chart(ctx, {
    type: 'line',
    data: {
      labels: validRows.map(r => r.date),
      datasets: [{
        label: 'USD/IRR',
        data: validRows.map(r => r.fixNum),
        borderColor: '#3b82f6',
        backgroundColor: 'rgba(59,130,246,0.15)',
        tension: 0.2,
        fill: true
      }]
    },
    options: {
      responsive: true,
      plugins: { legend: { display: false } },
      scales: {
        x: { ticks: { color: '#94a3b8' }, grid: { color: '#1e293b' } },
        y: { ticks: { color: '#94a3b8' }, grid: { color: '#1e293b' } }
      }
    }
  });
}
loadSeries();
</script>

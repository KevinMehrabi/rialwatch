<div class="row row-deck row-cards">
  <div class="col-lg-6">
    <div class="card bg-dark text-white">
      <div class="card-body">
        <div class="text-secondary mb-2">TODAY'S REFERENCE</div>
        <div class="h1 mb-1">${fix} IRR</div>
        <div class="text-secondary">Date: ${date} | As of: ${as_of}</div>
        <div class="row mt-4">
          <div class="col-4">
            <div class="text-secondary">Band (P25-P75)</div>
            <div>${p25} - ${p75}</div>
          </div>
          <div class="col-4">
            <div class="text-secondary">Status</div>
            <div>${status}</div>
          </div>
          <div class="col-4">
            <div class="text-secondary">Withheld</div>
            <div>${withheld}</div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="col-lg-6">
    <div class="card bg-dark text-white">
      <div class="card-body">
        <div class="text-secondary mb-2">HISTORICAL SERIES</div>
        <canvas id="historyChart" height="160"></canvas>
      </div>
    </div>
  </div>

  <div class="col-12">
    <div class="card bg-dark text-white">
      <div class="card-body">
        <div class="text-secondary mb-3">RECENT DAILY REFERENCES</div>
        <div class="table-responsive">
          <table class="table table-dark table-vcenter">
            <thead>
              <tr>
                <th>Date</th>
                <th>Fix</th>
                <th>Status</th>
              </tr>
            </thead>
            <tbody id="recent-days">
              <tr><td colspan="3">Loading...</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
async function loadSeries() {
  const seriesUrl = new URL('api/series.json', window.location.href);
  const res = await fetch(seriesUrl.toString());
  const data = await res.json();
  const rows = data.rows || [];
  const numericRows = rows
    .map(r => ({ ...r, fixNum: Number(r.fix) }))
    .filter(r => Number.isFinite(r.fixNum));

  const tbody = document.getElementById('recent-days');
  tbody.innerHTML = rows.slice(-30).reverse().map(r => `
    <tr>
      <td>${r.date}</td>
      <td>${r.fix ?? 'N/A'}</td>
      <td>${r.status ?? 'N/A'}</td>
    </tr>
  `).join('');

  const canvas = document.getElementById('historyChart');
  if (!canvas) return;
  const ctx = canvas.getContext('2d');

  if (!numericRows.length) {
    const holder = canvas.parentElement;
    if (holder && !holder.querySelector('.no-series-note')) {
      const note = document.createElement('div');
      note.className = 'text-secondary mt-2 no-series-note';
      note.textContent = 'No numeric IRR values available in series.json yet.';
      holder.appendChild(note);
    }
    return;
  }

  new Chart(ctx, {
    type: 'line',
    data: {
      labels: numericRows.map(r => r.date),
      datasets: [{
        label: 'USD/IRR',
        data: numericRows.map(r => r.fixNum),
        borderColor: '#3b82f6',
        backgroundColor: 'rgba(59,130,246,0.15)',
        tension: 0.2,
        fill: true
      }]
    },
    options: {
      responsive: true,
      plugins: { legend: { display: false } },
      scales: {
        x: { ticks: { color: '#94a3b8' }, grid: { color: '#1e293b' } },
        y: { ticks: { color: '#94a3b8' }, grid: { color: '#1e293b' } }
      }
    }
  });
}
loadSeries();
</script>
